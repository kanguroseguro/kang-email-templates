name: PR Preview

on:
  pull_request:
    branches: [master]

permissions:
  contents: read
  actions: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build templates
        run: |
          bun run build
          cp -r src/assets dist/assets
          node test-variations.js

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: email-previews
          path: dist/test
          retention-days: 14

      - name: Stage on SendGrid
        id: sendgrid
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: |
          RESULT=$(node deploy.js staging --json)
          echo "$RESULT"
          echo "staged<<EOF" >> "$GITHUB_OUTPUT"
          echo "$RESULT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const staged = JSON.parse(`${{ steps.sendgrid.outputs.staged }}`);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}/artifacts`;

            let body = `## 📧 Email Template Preview\n\n`;
            body += `**[Download preview HTML](${artifactUrl})** (artifact from this workflow run)\n\n`;
            body += `### SendGrid Staged Versions\n\n`;
            body += `| Template | Version | Preview in SendGrid |\n`;
            body += `|----------|---------|--------------------|\n`;
            for (const t of staged) {
              body += `| ${t.template} | \`${t.versionName}\` | [Open editor](${t.editorUrl}) |\n`;
            }
            body += `\n> These are **inactive** versions. They will be promoted to live on merge.`;

            // Update or create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## 📧 Email Template Preview';
            const existing = comments.find(c => c.body.startsWith(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
